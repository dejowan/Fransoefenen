<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Franse Woordjes</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;max-width:700px;margin:auto;padding:20px}
button{padding:12px 16px;margin:5px;font-size:16px}
.card{border:1px solid #ccc;border-radius:10px;padding:20px;margin-top:20px}
</style>
</head>
<body>
<h1>Franse Woordjes</h1>
<p>Kies een richting en voeg indien gewenst de volledige woordenlijst toe.</p>
<div class="card">
<button onclick="start('frnl')">Frans → Nederlands</button>
<button onclick="start('nlfr')">Nederlands → Frans</button>
</div>
<div id="app"></div>
<script>
const woorden=[
["un agent de police","een politieagent"],
["agréable","aangenaam"],
["appeler","(op)bellen"],
["apprendre","(aan)leren"],
["un après-midi","een namiddag"]
];
let lijst=[],idx=0,fouten=[],richting='frnl';
function start(r){
 richting=r; lijst=[...woorden].sort(()=>Math.random()-0.5); idx=0; fouten=[]; toon();
}
function toon(){
 if(idx>=lijst.length){
  document.getElementById('app').innerHTML=`<h2>Klaar!</h2><p>Fouten: ${fouten.length}</p>`+
  (fouten.length?'<button onclick="herhaal()">Oefen foute woorden</button>':'');
  return;
 }
 let w=lijst[idx];
 let vraag=richting==='frnl'?w[0]:w[1];
 let antw=richting==='frnl'?w[1]:w[0];
 document.getElementById('app').innerHTML=`<div class="card">
 <h2>${vraag}</h2>
 <button onclick="document.getElementById('ans').style.display='block'">Toon antwoord</button>
 <div id="ans" style="display:none">
 <p><b>${antw}</b></p>
 <button onclick="goed()">Juist</button>
 <button onclick="fout()">Fout</button>
 </div></div>`;
}
function goed(){idx++;toon();}
function fout(){fouten.push(lijst[idx]);idx++;toon();}
function herhaal(){lijst=[...fouten];fouten=[];idx=0;toon();}
</script>
</body>
</html>
